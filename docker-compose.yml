services:
  neo4j:
    image: neo4j:5.26.22-community
    ports: ["127.0.0.1:7687:7687"]
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      NEO4J_USERNAME: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
    volumes:
      - ${FIELDNOTES_DATA:-~/.fieldnotes/data}/neo4j:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports: ["127.0.0.1:6333:6333"]
    volumes:
      - ${FIELDNOTES_DATA:-~/.fieldnotes/data}/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  pushgateway:
    image: prom/pushgateway:v1.11.0
    ports: ["127.0.0.1:9091:9091"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9091/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 64m

  prometheus:
    image: prom/prometheus:v3.3.1
    ports: ["127.0.0.1:9090:9090"]
    volumes:
      - ${FIELDNOTES_DATA:-~/.fieldnotes/data}/prometheus:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    depends_on: [pushgateway]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m

  grafana:
    image: grafana/grafana-oss:11.6.0
    ports: ["127.0.0.1:3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
    volumes:
      - ${FIELDNOTES_DATA:-~/.fieldnotes/data}/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on: [prometheus]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128m
