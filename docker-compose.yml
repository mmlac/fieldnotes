services:
  neo4j:
    image: neo4j:5.26.22-community
    ports: ["127.0.0.1:7687:7687"]
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
    volumes:
      - ${FIELDNOTES_DATA:-~/.fieldnotes/data}/neo4j:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports: ["127.0.0.1:6333:6333"]
    volumes:
      - ${FIELDNOTES_DATA:-~/.fieldnotes/data}/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
