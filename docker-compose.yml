services:
  neo4j:
    image: neo4j:5-community
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-fieldnotes}
    volumes:
      - ${FIELDNOTES_DATA:-~/.fieldnotes/data}/neo4j:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes:
      - ${FIELDNOTES_DATA:-~/.fieldnotes/data}/qdrant:/qdrant/storage
